<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회의록 자동 정리</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --border: #e2e5ea;
    --text: #1f2937;
    --sub: #6b7280;
    --accent: #2563eb;
    --accent-dark: #1d4ed8;
    --accent-bg: #eff4ff;
    --danger: #dc2626;
    --ok: #16a34a;
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .page { max-width: 1100px; margin: 0 auto; padding: 32px 20px 70px; }
  header { margin-bottom: 20px; }
  header h1 { font-size: 22px; font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
  header p { color: var(--sub); font-size: 14px; margin: 0; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
  @media (max-width: 860px) { .grid-2 { grid-template-columns: 1fr; } }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.03);
    margin-bottom: 18px;
  }
  .card-title { font-size: 15px; font-weight: 700; margin: 0 0 14px; }

  label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }

  input[type="text"], textarea {
    width: 100%;
    background: #fff;
    border: 1px solid #d1d5db;
    color: var(--text);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    resize: vertical;
  }
  input[type="text"]:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-bg);
  }
  textarea#memoInput { min-height: 130px; }
  textarea#attendeesInput { min-height: 70px; }
  textarea#transcriptBox { min-height: 200px; line-height: 1.6; }
  textarea#draftBox { min-height: 380px; line-height: 1.6; font-family: ui-monospace, "SFMono-Regular", Menlo, monospace; font-size: 13px; }

  .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
  .btn-row:last-of-type { margin-bottom: 0; }
  button.btn {
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    flex: 1 1 auto;
    min-width: 140px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--accent-dark); }
  .btn-primary:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; }
  .btn-outline { background: #fff; border: 1px solid #d1d5db; color: var(--text); }
  .btn-outline:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .btn-outline:disabled { color: #b0b7c3; border-color: #e5e7eb; cursor: not-allowed; }
  .btn-muted { background: #f3f4f6; border: 1px solid #e5e7eb; color: #374151; }
  .btn-muted:hover:not(:disabled) { background: #e9eaed; }
  .btn-muted:disabled { color: #b0b7c3; background: #f3f4f6; cursor: not-allowed; }

  .btn-link {
    background: none;
    border: none;
    color: var(--sub);
    font-size: 12px;
    font-weight: 500;
    text-decoration: underline;
    cursor: pointer;
    padding: 4px 6px;
    flex: 0 0 auto;
    min-width: auto;
    align-self: center;
  }
  .btn-link:hover:not(:disabled) { color: var(--accent); }
  .btn-link:disabled { color: #cbd5e1; text-decoration: none; cursor: not-allowed; }

  .card-header-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 10px; }
  .card-header-row .card-title { margin: 0; }

  .hint { font-size: 12px; color: var(--sub); margin: -4px 0 10px; }

  .status-line { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #d1d5db; flex-shrink: 0; }
  .dot.live { background: var(--danger); box-shadow: 0 0 0 4px rgba(220,38,38,0.15); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  #recStatus { font-size: 13px; color: var(--sub); }
  #recStatus.ok { color: var(--ok); font-weight: 600; }
  #recStatus.error { color: var(--danger); font-weight: 600; }

  .status-msg { font-size: 13px; margin-top: 10px; min-height: 16px; }
  .status-msg.error { color: var(--danger); }
  .status-msg.ok { color: var(--ok); }
  .result-link { display: inline-block; margin-left: 6px; color: var(--accent); font-weight: 600; }
</style>
</head>
<body>

<div class="page">
  <header>
    <h1>회의록 자동 정리</h1>
    <p>녹음 또는 파일 업로드로 회의 내용을 텍스트화하고 회의록으로 정리합니다.</p>
  </header>

  <div class="grid-2">
    <section class="card">
      <h2 class="card-title">회의 음성 입력</h2>

      <div class="btn-row">
        <button class="btn btn-primary" id="startBtn">녹음 시작</button>
        <button class="btn btn-outline" id="stopBtn" disabled>녹음 정지</button>
        <button class="btn-link" id="downloadRecordingBtn" disabled>녹음파일 다운로드</button>
      </div>

      <div class="btn-row">
        <button class="btn btn-muted" id="uploadTriggerBtn">녹음파일 업로드</button>
        <input type="file" id="fileInput" accept="audio/*" hidden>
      </div>
      <p class="hint">wav, mp3, m4a, webm 등 브라우저에서 재생 가능한 음성파일</p>

      <div class="status-line">
        <span class="dot" id="recDot"></span>
        <span id="recStatus">대기 중</span>
      </div>
    </section>

    <section class="card">
      <h2 class="card-title">회의 정보 입력</h2>
      <div class="field">
        <label for="attendeesInput">참석자</label>
        <textarea id="attendeesInput" placeholder="예) 서유리, 김OO, 박OO"></textarea>
      </div>
      <div class="field">
        <label for="memoInput">회의 중 메모</label>
        <textarea id="memoInput" placeholder="결정사항, 담당자, 확인 필요사항 등을 메모하세요."></textarea>
      </div>
    </section>
  </div>

  <section class="card">
    <div class="card-header-row">
      <h2 class="card-title">녹음 텍스트 변환 내용</h2>
      <button class="btn-link" id="downloadTranscriptBtn">녹음 텍스트파일 다운로드</button>
    </div>
    <div class="field">
      <textarea id="transcriptBox" placeholder="녹음 또는 파일 업로드 시 텍스트가 여기에 표시됩니다. 직접 수정할 수 있습니다."></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="formatBtn" disabled>회의록 양식으로 정리하기</button>
    </div>
    <div class="status-msg" id="formatStatus"></div>
  </section>

  <section class="card">
    <h2 class="card-title">회의록 확인 &amp; 게시</h2>
    <div class="field">
      <label for="titleInput">페이지 제목</label>
      <input type="text" id="titleInput" placeholder="정리 후 추천 제목이 자동 입력됩니다.">
    </div>
    <div class="field">
      <label for="draftBox">정리된 회의록</label>
      <textarea id="draftBox" placeholder="정리하기 버튼을 누르면 여기에 결과가 표시됩니다."></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="publishBtn">컨플루언스에 게시하기</button>
    </div>
    <div class="status-msg" id="publishStatus"></div>
  </section>
</div>

<script>
  // ---- DOM 참조 ----
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const uploadTriggerBtn = document.getElementById('uploadTriggerBtn');
  const fileInput = document.getElementById('fileInput');
  const downloadRecordingBtn = document.getElementById('downloadRecordingBtn');
  const downloadTranscriptBtn = document.getElementById('downloadTranscriptBtn');
  const recDot = document.getElementById('recDot');
  const recStatus = document.getElementById('recStatus');

  const attendeesInput = document.getElementById('attendeesInput');
  const memoInput = document.getElementById('memoInput');

  const transcriptBox = document.getElementById('transcriptBox');
  const formatBtn = document.getElementById('formatBtn');
  const formatStatus = document.getElementById('formatStatus');

  const titleInput = document.getElementById('titleInput');
  const draftBox = document.getElementById('draftBox');
  const publishBtn = document.getElementById('publishBtn');
  const publishStatus = document.getElementById('publishStatus');

  // ---- 상수 ----
  const TARGET_SAMPLE_RATE = 16000;
  const CHUNK_SECONDS = 50; // Google STT 동기 API 1분 제한보다 여유있게 설정

  // ---- 상태 ----
  let audioCtx = null;
  let sourceNode = null;
  let processorNode = null;
  let silentGain = null;
  let mediaStream = null;
  let isRecording = false;
  let isFileConverting = false;
  let pendingTranscribeCount = 0;
  let chunkNumber = 0;

  let pendingSamples = [];        // STT 청크 전송용 (native rate, 청크마다 초기화)
  let samplesSinceLastChunk = 0;
  let fullRecordingSamples = [];  // 전체 녹음 다운로드용 (native rate, 녹음 끝날 때까지 누적)
  let recordingNativeRate = null;
  let recordingWavBlob = null;

  // ---- 날짜/시간 헬퍼 ----
  function pad(n) { return String(n).padStart(2, '0'); }
  function todayDate() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
  }
  function nowDateTime() {
    const d = new Date();
    return `${todayDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }
  function nowStamp() {
    const d = new Date();
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}-${pad(d.getHours())}-${pad(d.getMinutes())}`;
  }

  // ---- 오디오 처리 헬퍼 ----
  function mergeFloat32Arrays(arrays) {
    let totalLength = 0;
    for (const a of arrays) totalLength += a.length;
    const merged = new Float32Array(totalLength);
    let offset = 0;
    for (const a of arrays) { merged.set(a, offset); offset += a.length; }
    return merged;
  }

  function downsampleTo16k(float32Arrays, inputSampleRate) {
    const merged = mergeFloat32Arrays(float32Arrays);
    if (inputSampleRate === TARGET_SAMPLE_RATE) return merged;
    const ratio = inputSampleRate / TARGET_SAMPLE_RATE;
    const newLength = Math.round(merged.length / ratio);
    const result = new Float32Array(newLength);
    for (let i = 0; i < newLength; i++) {
      result[i] = merged[Math.round(i * ratio)] || 0;
    }
    return result;
  }

  function floatTo16BitPCM(float32Array) {
    const buffer = new ArrayBuffer(float32Array.length * 2);
    const view = new DataView(buffer);
    let offset = 0;
    for (let i = 0; i < float32Array.length; i++, offset += 2) {
      const s = Math.max(-1, Math.min(1, float32Array[i]));
      view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
    }
    return buffer;
  }

  function encodeWav(pcm16Buffer, sampleRate) {
    const numChannels = 1;
    const bitsPerSample = 16;
    const byteRate = sampleRate * numChannels * bitsPerSample / 8;
    const blockAlign = numChannels * bitsPerSample / 8;
    const dataSize = pcm16Buffer.byteLength;
    const buffer = new ArrayBuffer(44 + dataSize);
    const view = new DataView(buffer);

    function writeString(offset, str) {
      for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
    }

    writeString(0, 'RIFF');
    view.setUint32(4, 36 + dataSize, true);
    writeString(8, 'WAVE');
    writeString(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, numChannels, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, byteRate, true);
    view.setUint16(32, blockAlign, true);
    view.setUint16(34, bitsPerSample, true);
    writeString(36, 'data');
    view.setUint32(40, dataSize, true);
    new Uint8Array(buffer, 44).set(new Uint8Array(pcm16Buffer));

    return buffer;
  }

  function arrayBufferToBase64(buffer) {
    let binary = '';
    const bytes = new Uint8Array(buffer);
    const chunkSize = 0x8000;
    for (let i = 0; i < bytes.length; i += chunkSize) {
      binary += String.fromCharCode.apply(null, bytes.subarray(i, i + chunkSize));
    }
    return btoa(binary);
  }

  function downloadBlob(blob, filename) {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  // ---- 상태 표시 ----
  function setStatus(text, kind) {
    recStatus.textContent = text;
    recStatus.classList.remove('ok', 'error');
    recDot.classList.remove('live');
    if (kind === 'recording') recDot.classList.add('live');
    if (kind === 'done') recStatus.classList.add('ok');
    if (kind === 'error') recStatus.classList.add('error');
  }

  function updateFormatButtonState() {
    formatBtn.disabled = isRecording || isFileConverting || pendingTranscribeCount > 0 || !transcriptBox.value.trim();
  }
  transcriptBox.addEventListener('input', updateFormatButtonState);

  // ---- STT 청크 전송 (공통: 실시간 녹음 / 파일 업로드 모두 사용) ----
  async function sendChunk(float32Arrays, inputSampleRate, label) {
    pendingTranscribeCount++;
    updateFormatButtonState();
    chunkNumber++;
    const thisChunk = chunkNumber;
    try {
      const downsampled = downsampleTo16k(float32Arrays, inputSampleRate);
      const pcm16 = floatTo16BitPCM(downsampled);
      const wavBuffer = encodeWav(pcm16, TARGET_SAMPLE_RATE);
      const audioBase64 = arrayBufferToBase64(wavBuffer);

      const res = await fetch('/api/transcribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          audioBase64,
          encoding: 'LINEAR16',
          sampleRateHertz: TARGET_SAMPLE_RATE,
          languageCode: 'ko-KR'
        })
      });
      const data = await res.json();
      if (!res.ok) {
        console.error('transcribe error', data);
        transcriptBox.value += `\n[${label ? label + ' ' : ''}${thisChunk}번째 구간 인식 실패: ${data.detail || data.error}]\n`;
        setStatus(`오류: ${thisChunk}번째 구간 변환 실패`, 'error');
        return;
      }
      if (data.transcript) {
        transcriptBox.value += (transcriptBox.value.trim() ? ' ' : '') + data.transcript;
      }
    } catch (err) {
      transcriptBox.value += `\n[${thisChunk}번째 구간 전송 오류: ${err.message}]\n`;
      setStatus(`오류: ${thisChunk}번째 구간 전송 실패`, 'error');
    } finally {
      pendingTranscribeCount--;
      updateFormatButtonState();
    }
  }

  // ---- 실시간 녹음 (Web Audio API) ----
  async function startRecording() {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      alert('이 브라우저는 마이크 녹음을 지원하지 않습니다.');
      return;
    }
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    await audioCtx.resume();

    sourceNode = audioCtx.createMediaStreamSource(mediaStream);
    processorNode = audioCtx.createScriptProcessor(4096, 1, 1);
    silentGain = audioCtx.createGain();
    silentGain.gain.value = 0;

    pendingSamples = [];
    samplesSinceLastChunk = 0;
    fullRecordingSamples = [];
    recordingWavBlob = null;
    downloadRecordingBtn.disabled = true;
    chunkNumber = 0;

    recordingNativeRate = audioCtx.sampleRate;
    const samplesPerChunk = recordingNativeRate * CHUNK_SECONDS;

    processorNode.onaudioprocess = (e) => {
      const input = e.inputBuffer.getChannelData(0);
      const copy = new Float32Array(input);
      pendingSamples.push(copy);
      fullRecordingSamples.push(new Float32Array(input));
      samplesSinceLastChunk += input.length;

      if (samplesSinceLastChunk >= samplesPerChunk) {
        const toSend = pendingSamples;
        pendingSamples = [];
        samplesSinceLastChunk = 0;
        sendChunk(toSend, recordingNativeRate);
      }
    };

    sourceNode.connect(processorNode);
    processorNode.connect(silentGain);
    silentGain.connect(audioCtx.destination);

    isRecording = true;
    setStatus('녹음 중', 'recording');
    startBtn.disabled = true;
    stopBtn.disabled = false;
    updateFormatButtonState();
  }

  async function stopRecording() {
    isRecording = false;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    setStatus('마지막 구간 변환 중', 'processing');
    updateFormatButtonState();

    if (processorNode) processorNode.disconnect();
    if (sourceNode) sourceNode.disconnect();
    if (silentGain) silentGain.disconnect();
    if (mediaStream) mediaStream.getTracks().forEach((t) => t.stop());

    if (pendingSamples.length > 0) {
      const toSend = pendingSamples;
      pendingSamples = [];
      await sendChunk(toSend, recordingNativeRate);
    }

    if (fullRecordingSamples.length > 0) {
      const merged = mergeFloat32Arrays(fullRecordingSamples);
      const pcm16 = floatTo16BitPCM(merged);
      const wavBuffer = encodeWav(pcm16, recordingNativeRate);
      recordingWavBlob = new Blob([wavBuffer], { type: 'audio/wav' });
      downloadRecordingBtn.disabled = false;
    }

    if (audioCtx) await audioCtx.close();
    setStatus('변환 완료', 'done');
    updateFormatButtonState();
  }

  startBtn.addEventListener('click', () => {
    startRecording().catch((err) => {
      setStatus('오류: 마이크 접근 실패', 'error');
      alert('마이크 접근 오류: ' + err.message);
    });
  });
  stopBtn.addEventListener('click', () => { stopRecording(); });

  // ---- 녹음파일 다운로드 ----
  downloadRecordingBtn.addEventListener('click', () => {
    if (!recordingWavBlob) return;
    downloadBlob(recordingWavBlob, `meeting-recording-${nowStamp()}.wav`);
  });

  // ---- STT 텍스트 다운로드 ----
  downloadTranscriptBtn.addEventListener('click', () => {
    const text = transcriptBox.value.trim();
    if (!text) {
      formatStatus.textContent = '다운로드할 텍스트가 없습니다.';
      formatStatus.className = 'status-msg error';
      return;
    }
    const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    downloadBlob(blob, `meeting-transcript-${nowStamp()}.txt`);
  });

  // ---- 녹음파일 업로드 후 STT 변환 ----
  uploadTriggerBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    fileInput.value = '';
    if (!file) return;
    await handleFileUpload(file);
  });

  async function handleFileUpload(file) {
    isFileConverting = true;
    updateFormatButtonState();
    setStatus('파일 변환 중', 'processing');

    let decodeCtx = null;
    try {
      const arrayBuffer = await file.arrayBuffer();
      const AC = window.AudioContext || window.webkitAudioContext;
      decodeCtx = new AC();

      let audioBuffer;
      try {
        audioBuffer = await decodeCtx.decodeAudioData(arrayBuffer);
      } catch (decodeErr) {
        throw new Error('오디오 디코딩 실패 (' + decodeErr.message + ')');
      }

      const numCh = audioBuffer.numberOfChannels;
      const length = audioBuffer.length;
      const mono = new Float32Array(length);
      for (let ch = 0; ch < numCh; ch++) {
        const chData = audioBuffer.getChannelData(ch);
        for (let i = 0; i < length; i++) mono[i] += chData[i] / numCh;
      }

      const nativeRate = audioBuffer.sampleRate;
      const samplesPerChunk = Math.floor(nativeRate * CHUNK_SECONDS);

      for (let start = 0; start < mono.length; start += samplesPerChunk) {
        const segment = mono.subarray(start, Math.min(start + samplesPerChunk, mono.length));
        await sendChunk([segment], nativeRate, '업로드 파일');
      }

      setStatus('변환 완료', 'done');
    } catch (err) {
      setStatus('오류: ' + err.message, 'error');
      transcriptBox.value += `\n[파일 변환 오류: ${err.message}]\n`;
    } finally {
      if (decodeCtx) { try { await decodeCtx.close(); } catch (e) {} }
      isFileConverting = false;
      updateFormatButtonState();
    }
  }

  // ---- 회의록 정리 (Claude) ----
  formatBtn.addEventListener('click', async () => {
    const text = transcriptBox.value.trim();
    if (!text) {
      formatStatus.textContent = '먼저 녹음하거나 텍스트를 입력해 주세요.';
      formatStatus.className = 'status-msg error';
      return;
    }
    formatBtn.disabled = true;
    formatStatus.textContent = 'Claude가 회의록을 정리하고 있습니다...';
    formatStatus.className = 'status-msg';
    try {
      const res = await fetch('/api/format', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          transcript: text,
          participants: attendeesInput.value.trim(),
          memo: memoInput.value.trim(),
          date: todayDate(),
          dateTime: nowDateTime()
        })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '정리 중 오류가 발생했습니다.');
      titleInput.value = data.title || (todayDate() + ' 회의록');
      draftBox.value = data.formatted || data.minutes || '';
      formatStatus.textContent = '정리 완료. 아래에서 확인 후 게시하세요.';
      formatStatus.className = 'status-msg ok';
    } catch (err) {
      formatStatus.textContent = '오류: ' + err.message;
      formatStatus.className = 'status-msg error';
    } finally {
      updateFormatButtonState();
    }
  });

  // ---- Confluence 게시 ----
  publishBtn.addEventListener('click', async () => {
    const title = titleInput.value.trim();
    const content = draftBox.value.trim();
    if (!title || !content) {
      publishStatus.textContent = '제목과 회의록 내용을 모두 입력해 주세요.';
      publishStatus.className = 'status-msg error';
      return;
    }
    publishBtn.disabled = true;
    publishStatus.textContent = '컨플루언스에 게시 중...';
    publishStatus.className = 'status-msg';
    try {
      const res = await fetch('/api/publish', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, content })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || '게시 중 오류가 발생했습니다.');
      publishStatus.innerHTML = '게시 완료! <a class="result-link" href="' + data.url + '" target="_blank">게시된 페이지 바로가기</a>';
      publishStatus.className = 'status-msg ok';
    } catch (err) {
      publishStatus.textContent = '오류: ' + err.message;
      publishStatus.className = 'status-msg error';
    } finally {
      publishBtn.disabled = false;
    }
  });

  updateFormatButtonState();
</script>
</body>
</html>
